# Soroban SDK 26 requires the `wasm32v1-none` build target (Rust 1.84+).
# The older `wasm32-unknown-unknown` target is unsupported on modern Rust
# because it enables WASM features the Soroban environment cannot run.
[toolchain]
channel = "stable"
targets = ["wasm32v1-none"]
components = ["rustfmt", "clippy"]
profile = "minimal"
